<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kalkulator ogrodzeń</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1fae4b">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1fae4b;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 9999;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #loader img {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }

    iframe {
      border: none;
      transform: scale(0.7);
      transform-origin: top left;
      width: calc(100vw / 0.7);
      height: calc(100vh / 0.7);
      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔄 LOADER -->
  <div id="loader">
    <img src="icon-192.png" alt="logo">
    <div>Ładowanie aplikacji...</div>
  </div>

  <!-- 🔥 APPS SCRIPT -->
  <iframe id="appFrame" src="https://script.google.com/a/macros/leroymerlin.pl/s/AKfycbyCPQolLYpt9neQ669Q48-74_3mlN0jVF8wxqn8N_wFqGquONXxstWah3xizq_piv4_/exec"></iframe>

  <script>
    const iframe = document.getElementById("appFrame");
    const loader = document.getElementById("loader");

    let loaded = false;

    // iframe loaded
    iframe.onload = () => {
      loaded = true;
      loader.style.display = "none";
      iframe.style.display = "block";
    };

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    // skrót → pokaż instrukcję
    if (!isStandalone) {
      loader.innerHTML = `
        <div>
          <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
          <div style="margin-bottom:10px; font-size:18px;">Dla poprawnego działania</div>
          <div style="margin-bottom:15px;">zainstaluj aplikację</div>
          <div style="font-size:14px; opacity:0.8;">menu ⋮ → Zainstaluj aplikację</div>
        </div>
      `;
    }

    // aplikacja → auto start
    if (isStandalone) {
      loader.innerHTML = `
        <div>
          <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
          <div>Uruchamiam aplikację...</div>
        </div>
      `;

      setTimeout(() => {
        if (!loaded) {
          console.warn("[PWA] iframe zablokowany – auto redirect");
          window.location.href = iframe.src;
        }
      }, 1200);
    }
  </script>

</body>
</html>
