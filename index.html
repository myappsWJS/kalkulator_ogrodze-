<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kalkulator ogrodzeń</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1fae4b">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1fae4b;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 9999;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #loader img {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }

    iframe {
      border: none;
      transform: scale(0.7);
      transform-origin: top left;
      width: calc(100vw / 0.7);
      height: calc(100vh / 0.7);
      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔄 LOADER -->
  <div id="loader">
    <img src="icon-192.png" alt="logo">
    <div>Ładowanie aplikacji...</div>
  </div>

  <!-- 🔥 APPS SCRIPT -->
  <iframe id="appFrame"></iframe>

  <script>
    const iframe = document.getElementById("appFrame");
    const APP_URL = "https://script.google.com/a/macros/leroymerlin.pl/s/AKfycbyCPQolLYpt9neQ669Q48-74_3mlN0jVF8wxqn8N_wFqGquONXxstWah3xizq_piv4_/exec";
    const loader = document.getElementById("loader");

    // iframe loaded
    iframe.onload = () => {
      loader.style.display = "none";
      iframe.style.display = "block";
    };

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

    // 📱 MOBILE (przeglądarka) → pokaż instrukcję instalacji
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      loader.innerHTML = `
        <div>
          <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
          <div style="margin-bottom:10px; font-size:18px;">Zainstaluj aplikację</div>
          <div style="margin-bottom:15px; font-size:14px; opacity:0.9;">dla najlepszego działania</div>
          <div style="font-size:14px; opacity:0.8; margin-bottom:20px;">kliknij poniżej</div>
          <button id="installBtn" style="padding:10px 20px; font-size:16px; cursor:pointer;">
            Zainstaluj
          </button>
        </div>
      `;

      setTimeout(() => {
        const btn = document.getElementById("installBtn");
        if (btn) {
          btn.onclick = async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const choice = await deferredPrompt.userChoice;

              if (choice.outcome === 'accepted') {
                loader.innerHTML = `
                  <div>
                    <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
                    <div>Aplikacja zainstalowana</div>
                    <div style="font-size:14px; opacity:0.8; margin-top:10px;">
                      Uruchom ją z ekranu głównego
                    </div>
                  </div>
                `;
              }

              deferredPrompt = null;
            }
          };
        }
      }, 100);
    });

    // fallback jeśli event się nie pojawi
    if (!isStandalone && isMobile && !deferredPrompt) {
      loader.innerHTML = `
        <div>
          <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
          <div style="margin-bottom:10px; font-size:18px;">Dla poprawnego działania</div>
          <div style="margin-bottom:15px;">zainstaluj aplikację</div>
          <div style="font-size:14px; opacity:0.8;">menu ⋮ → Zainstaluj aplikację</div>
        </div>
      `;
    }

    // 💻 DESKTOP → przekierowanie (iframe blokowany przez Google)
    if (!isStandalone && !isMobile) {
      loader.innerHTML = `
        <div>
          <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
          <div>Uruchamiam aplikację...</div>
        </div>
      `;

      setTimeout(() => {
        window.location.href = APP_URL;
      }, 800);
    }

    // aplikacja → auto start
    if (isStandalone) {
      loader.innerHTML = `
        <div>
          <img src="icon-192.png" alt="logo" style="width:70px; margin-bottom:15px;">
          <div>Uruchamiam aplikację...</div>
        </div>
      `;

      // 👉 bez iframe (eliminuje migający błąd)
      setTimeout(() => {
        window.location.href = APP_URL;
      }, 900);
    }
  </script>

</body>
</html>
