<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.7, maximum-scale=1.0">

  <title>Kalkulator ogrodzeń</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1fae4b">

  <!-- iOS fallback -->
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1fae4b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 9999;
    }

    iframe {
      border: none;
      width: 100vw;
      height: 100vh;
      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔄 LOADER -->
  <div id="loader">Ładowanie aplikacji...</div>

  <!-- 🔥 TU WKLEJ SWÓJ LINK APPS SCRIPT -->
  <iframe id="appFrame" src="https://script.google.com/a/macros/leroymerlin.pl/s/AKfycbyCPQolLYpt9neQ669Q48-74_3mlN0jVF8wxqn8N_wFqGquONXxstWah3xizq_piv4_/exec"></iframe>

  <script>
    const iframe = document.getElementById("appFrame");
    const loader = document.getElementById("loader");

    iframe.onload = () => {
      loader.style.display = "none";
      iframe.style.display = "block";
    };
  </script>

</body>
</html>
