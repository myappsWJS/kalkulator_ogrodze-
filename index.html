<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kalkulator ogrodzeń</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1fae4b">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1fae4b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      z-index: 9999;
    }

    iframe {
      border: none;
      /* 🔥 poprawne skalowanie BEZ psucia szerokości */
      transform: scale(0.7);
      transform-origin: top left;

      /* dynamiczna kompensacja */
      width: calc(100vw / 0.7);
      height: calc(100vh / 0.7);

      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔄 LOADER -->
  <div id="loader">Ładowanie aplikacji...</div>

  <!-- 🔥 TU WKLEJ SWÓJ LINK APPS SCRIPT -->
  <iframe id="appFrame" src="https://script.google.com/a/macros/leroymerlin.pl/s/AKfycbyCPQolLYpt9neQ669Q48-74_3mlN0jVF8wxqn8N_wFqGquONXxstWah3xizq_piv4_/exec"></iframe>

  <script>
    const iframe = document.getElementById("appFrame");
    const loader = document.getElementById("loader");

    let loaded = false;

    // jeśli iframe się załaduje poprawnie
    iframe.onload = () => {
      loaded = true;
      loader.style.display = "none";
      iframe.style.display = "block";
    };

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    // 🔥 fallback tylko w aplikacji
    if (isStandalone) {
      setTimeout(() => {
        if (!loaded) {
          console.warn("[PWA] iframe zablokowany – pokazuję przycisk");

          loader.innerHTML = `
            <div style="text-align:center; padding:20px;">
              <div style="margin-bottom:15px;">Nie udało się uruchomić aplikacji</div>
              <button id="openAppBtn" style="padding:10px 20px; font-size:16px; cursor:pointer;">
                Otwórz aplikację
              </button>
            </div>
          `;

          document.getElementById("openAppBtn").onclick = () => {
            window.location.href = iframe.src;
          };
        }
      }, 1500);
    }
  </script>

</body>
</html>
